<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
const user = JSON.parse(localStorage.getItem("currentUser"));
let products = JSON.parse(localStorage.getItem("products")) || [];

products.push({
    name: name,
    price: price,
    image: image,
    desc: desc,
    detail: detailText
});

localStorage.setItem("products", JSON.stringify(products));
if(!user || user.role !== "admin"){
    alert("Không có quyền!");
    window.location.href = "login.html";
}
</script>
<h1 style="text-align:center">QUẢN LÝ SẢN PHẨM</h1>

<div class="form-box">
    <h2>QUẢN LÝ SẢN PHẨM</h2>

    <input id="name" placeholder="Tên sản phẩm">
    <input id="price" placeholder="Giá">
    <input id="image" placeholder="Link ảnh">
    <input id="desc" placeholder="Mô tả">
    <textarea id="detailText" placeholder="Chi tiết"></textarea>

    <button onclick="addProduct()">Thêm sản phẩm</button>
</div>

<h2 style="text-align:center">Danh sách</h2>

<div id="adminList" style="padding:40px"></div>

<script src="script.js"></script>
</body>
</html>
